# Blueprint Render pour deployer le backend.
# Sur https://render.com : New > Blueprint > pointe vers ce depot.
services:
  - type: web
    name: finance-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false # a remplir : URI MongoDB Atlas
      - key: JWT_SECRET
        generateValue: true # genere automatiquement
      - key: GNEWS_API_TOKEN
        sync: false # a remplir : cle gnews.io (optionnel)
      - key: NODE_VERSION
        value: "22"
