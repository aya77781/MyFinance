# Blueprint Render pour deployer le backend.
# Sur https://render.com : New > Blueprint > pointe vers ce depot.
services:
  - type: web
    name: finance-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    # Stockage en fichiers JSON. Pour conserver les donnees entre redeploiements,
    # ajoute un disque persistant ci-dessous et regle DATA_DIR sur son point de
    # montage (le disque persistant n'est pas dispo sur le plan "free").
    # disk:
    #   name: finance-data
    #   mountPath: /data
    #   sizeGB: 1
    envVars:
      # - key: DATA_DIR
      #   value: /data # a activer si tu ajoutes le disque persistant ci-dessus
      - key: JWT_SECRET
        generateValue: true # genere automatiquement
      - key: SERPAPI_KEY
        sync: false # a remplir dans le dashboard Render : cle serpapi.com (news, prioritaire)
      - key: GNEWS_API_TOKEN
        sync: false # a remplir : cle gnews.io (repli, optionnel)
      - key: NODE_VERSION
        value: "22"
